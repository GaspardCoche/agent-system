name: Test Reusable With Outputs
on:
  workflow_call:
    inputs:
      agent_role:
        required: true
        type: string
    outputs:
      result_json:
        description: "Result"
        value: ${{ jobs.run_agent.outputs.result_json }}

jobs:
  run_agent:
    runs-on: ubuntu-latest
    outputs:
      result_json: ${{ steps.make_result.outputs.result_json }}
    steps:
      - name: Make result
        id: make_result
        run: echo "result_json=hello" >> $GITHUB_OUTPUT
