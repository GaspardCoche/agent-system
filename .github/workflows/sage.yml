name: Sage — Weekly Self-Improvement
on:
  schedule:
    - cron: '0 9 * * 0'  # Dimanche 9h UTC
  workflow_dispatch:
    inputs:
      force_skill_validation:
        description: 'Force validation of all candidate skills'
        required: false
        default: 'false'
        type: string

jobs:
  sage-weekly:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}


      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests google-genai -q

      - name: Collect recent retrospectives
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import subprocess, json, os, glob
          from datetime import datetime, timedelta

          repo = os.environ.get("GITHUB_REPOSITORY", "")
          since = (datetime.utcnow() - timedelta(days=7)).strftime("%Y-%m-%dT%H:%M:%SZ")

          # Step 1: Cross-check — list agent runs from last 7 days
          runs_result = subprocess.run(
              ["gh", "run", "list", "--limit", "50", "--json", "databaseId,name,status,conclusion,createdAt",
               "--repo", repo],
              capture_output=True, text=True
          )
          try:
              all_runs = json.loads(runs_result.stdout or "[]")
              # Filter to last 7 days, exclude health-check/vault-sync/deploy
              skip_workflows = {"Health Check", "Vault Sync", "Deploy Dashboard to GitHub Pages", "Agent Tester (PR)"}
              recent_agent_runs = [
                  r for r in all_runs
                  if r.get("createdAt", "") >= since and r.get("name", "") not in skip_workflows
              ]
          except Exception:
              recent_agent_runs = []

          print(f"Found {len(recent_agent_runs)} agent runs in last 7 days")
          for r in recent_agent_runs[:10]:
              print(f"  - {r.get('name', '?')} ({r.get('conclusion', '?')}) {r.get('createdAt', '?')[:10]}")

          # Step 2: Collect artifacts with retrospectives
          result = subprocess.run(
              ["gh", "api", f"repos/{repo}/actions/artifacts",
               "--jq", '.artifacts[] | select(.name | startswith("agent-result")) | select(.expired == false) | .id'],
              capture_output=True, text=True
          )

          artifact_ids = [aid for aid in result.stdout.strip().split("\n") if aid.strip()][:20]
          print(f"Found {len(artifact_ids)} non-expired agent-result artifacts")

          retrospectives = []
          for artifact_id in artifact_ids:
              try:
                  dl = subprocess.run(
                      ["gh", "api", f"repos/{repo}/actions/artifacts/{artifact_id}/zip",
                       "--output", f"/tmp/artifact_{artifact_id}.zip"],
                      capture_output=True, timeout=30
                  )
                  subprocess.run(["unzip", "-o", f"/tmp/artifact_{artifact_id}.zip",
                                  "-d", f"/tmp/artifact_{artifact_id}/"], capture_output=True)
                  for json_file in glob.glob(f"/tmp/artifact_{artifact_id}/**/*.json", recursive=True):
                      data = json.load(open(json_file))
                      if "retrospective" in data:
                          retrospectives.append(data)
              except Exception as e:
                  print(f"  Warning: failed to process artifact {artifact_id}: {e}")

          # Step 3: Diagnostic — if runs found but no retrospectives, flag pipeline issue
          diagnostic = {
              "agent_runs_count": len(recent_agent_runs),
              "artifacts_found": len(artifact_ids),
              "retrospectives_collected": len(retrospectives),
              "pipeline_status": "ok",
          }
          if recent_agent_runs and not retrospectives:
              diagnostic["pipeline_status"] = "broken"
              diagnostic["warning"] = "Agent runs detected but 0 retrospectives collected — artifacts may have expired or agents did not write retrospective field"
              print(f"\n⚠️  PIPELINE ISSUE: {diagnostic['warning']}")
          elif not recent_agent_runs:
              diagnostic["pipeline_status"] = "idle"
              print("\nNo agent runs this week — system idle")

          output = {"retrospectives": retrospectives, "diagnostic": diagnostic}
          json.dump(output, open("/tmp/all_retrospectives.json", "w"), indent=2)
          print(f"\nCollected {len(retrospectives)} retrospectives (pipeline: {diagnostic['pipeline_status']})")
          PYEOF

      - name: Write MCP config
        run: |
          printf '{"mcpServers":{"github":{"command":"npx","args":["-y","@modelcontextprotocol/server-github"],"env":{"GITHUB_PERSONAL_ACCESS_TOKEN":"PLACEHOLDER"}},"memory":{"command":"npx","args":["-y","@modelcontextprotocol/server-memory"],"env":{}}}}' \
            > /tmp/mcp-config.json
          sed -i "s/PLACEHOLDER/${{ secrets.GITHUB_TOKEN }}/g" /tmp/mcp-config.json

      - name: Write Sage task
        run: |
          python3 << 'PYEOF'
          import json, os

          task = {
              "task_id": os.environ.get("GITHUB_RUN_ID", "sage-weekly"),
              "event": "schedule",
              "repository": os.environ.get("GITHUB_REPOSITORY", ""),
              "description": "Weekly self-improvement cycle: analyze retrospectives, update skills registry, improve prompts, update lessons_learned.md",
              "title": "Sage Weekly Run",
              "force_skill_validation": os.environ.get("FORCE_SKILL_VALIDATION", "false"),
              "retrospectives_file": "/tmp/all_retrospectives.json"
          }

          json.dump(task, open("/tmp/agent_task.json", "w"), indent=2)
          PYEOF
        env:
          FORCE_SKILL_VALIDATION: ${{ inputs.force_skill_validation || 'false' }}

      - name: Run Sage agent
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Read agent_prompts/sage.md.
            Task is in /tmp/agent_task.json.
            Retrospectives and diagnostics are in /tmp/all_retrospectives.json (keys: "retrospectives", "diagnostic").
            Check diagnostic.pipeline_status first:
            - If "broken": investigate why artifacts are missing (check retention-days, upload-artifact steps). Add findings to lessons_learned.md.
            - If "idle": note system inactivity, still check skills and lessons.
            - If "ok": proceed with full analysis.
            Execute the weekly self-improvement cycle:
            1. Analyze retrospectives and MCP patterns
            2. Update skills/registry.json with new candidates
            3. Update memory/lessons_learned.md with new learnings
            4. If any skill candidate has usage_count >= 5, write and validate the skill
            5. Create PRs for prompt improvements if needed
            Write results to /tmp/agent_result.json
          claude_args: --max-turns 15 --allowedTools "Bash,Read,Write,Edit,mcp__github__add_issue_comment,mcp__github__create_pull_request,mcp__memory__add_observations,mcp__memory__search_nodes" --mcp-config /tmp/mcp-config.json
          settings: |
            {"env": {"GEMINI_API_KEY": "${{ secrets.GEMINI_API_KEY }}", "GITHUB_REPOSITORY": "${{ github.repository }}"}}

      - name: Upload Sage result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-result-sage-${{ github.run_id }}
          path: /tmp/agent_result.json
          retention-days: 7

      - name: Generate report + update dashboard
        if: always()
        env:
          REPO: ${{ github.repository }}
        run: |
          mkdir -p /tmp/sage_results
          cp /tmp/agent_result.json /tmp/sage_results/agent_result.json 2>/dev/null || true
          STATUS="success"
          python3 -c "import json,sys; d=json.load(open('/tmp/agent_result.json')); sys.exit(0 if d.get('status')=='complete' else 1)" 2>/dev/null || STATUS="failed"
          python3 .github/scripts/generate_report.py \
            --run-id "${{ github.run_id }}" \
            --workflow "sage" \
            --title "Sage Weekly $(date +%Y-%m-%d)" \
            --status "$STATUS" \
            --event "${{ github.event_name }}" \
            --repo "$REPO" \
            --results-dir /tmp/sage_results \
            --output-dir docs/reports \
            --dashboard-file docs/data/runs.json

      - name: Commit report and dashboard
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -d docs/vault ]; then
            python3 .github/scripts/vault_builder.py --vault-dir docs/vault --output docs/data/graph.json 2>/dev/null || true
          fi
          git add docs/reports/ docs/data/runs.json docs/data/graph.json docs/vault/ reports/ skills/ memory/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "report: sage weekly $(date +%Y-%m-%d) [run ${{ github.run_id }}]"
          git push

      - name: Send Slack notification
        if: always() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          RUN_URL="https://github.com/$REPO/actions/runs/$RUN_ID"
          PAYLOAD="{\"text\":\"🧠 *Sage* — Weekly self-improvement cycle completed · <${RUN_URL}|Run #${RUN_ID}>\"}"
          curl -s -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"
