name: Test Reusable Claude Min
on:
  workflow_call:
    inputs:
      agent_role:
        required: true
        type: string
      task_json:
        required: true
        type: string
      max_turns:
        required: false
        type: string
        default: "8"
      allowed_tools:
        required: false
        type: string
        default: "none"
    outputs:
      result_json:
        description: "Agent result as JSON string"
        value: ${{ jobs.run_agent.outputs.result_json }}
      status:
        description: "complete|failed|needs_retry"
        value: ${{ jobs.run_agent.outputs.status }}

jobs:
  run_agent:
    runs-on: ubuntu-latest
    outputs:
      result_json: ${{ steps.read_result.outputs.result_json }}
      status: ${{ steps.read_result.outputs.status }}
    steps:
      - uses: actions/checkout@v4
      - name: Build claude_args
        run: |
          BASE="Bash,Read,Write,Edit"
          EXTRA="${{ inputs.allowed_tools }}"
          if [[ "$EXTRA" == "none" || -z "$EXTRA" ]]; then
            TOOLS="$BASE"
          else
            TOOLS="$BASE,$EXTRA"
          fi
          echo "CLAUDE_ARGS=--max-turns ${{ inputs.max_turns }} --allowedTools $TOOLS" >> $GITHUB_ENV
      - name: Run Claude agent
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: "Role is ${{ inputs.agent_role }}. Say hello."
          claude_args: ${{ env.CLAUDE_ARGS }}
          settings: |
            {
              "env": {
                "AGENT_ROLE": "${{ inputs.agent_role }}",
                "GEMINI_API_KEY": "${{ secrets.GEMINI_API_KEY }}"
              }
            }
      - name: Read result
        id: read_result
        run: |
          echo "result_json=done" >> $GITHUB_OUTPUT
          echo "status=complete" >> $GITHUB_OUTPUT
