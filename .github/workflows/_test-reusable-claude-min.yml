name: Test Reusable Claude Min
on:
  workflow_call:
    inputs:
      agent_role:
        required: true
        type: string
      task_json:
        required: true
        type: string
      max_turns:
        required: false
        type: string
        default: "8"
      allowed_tools:
        required: false
        type: string
        default: "none"
    outputs:
      result_json:
        description: "Agent result as JSON string"
        value: ${{ jobs.run_agent.outputs.result_json }}
      status:
        description: "complete|failed|needs_retry"
        value: ${{ jobs.run_agent.outputs.status }}

jobs:
  run_agent:
    runs-on: ubuntu-latest
    outputs:
      result_json: ${{ steps.read_result.outputs.result_json }}
      status: ${{ steps.read_result.outputs.status }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Write task to disk
        run: printf '%s' '${{ inputs.task_json }}' > /tmp/agent_task.json

      - name: Write MCP config
        run: |
          cat > /tmp/mcp-config.json << 'MCPEOF'
          {"mcpServers":{"memory":{"command":"npx","args":["-y","@modelcontextprotocol/server-memory"],"env":{}}}}
          MCPEOF

      - name: Build claude_args
        run: |
          BASE="Bash,Read,Write,Edit"
          EXTRA="${{ inputs.allowed_tools }}"
          if [[ "$EXTRA" == "none" || -z "$EXTRA" ]]; then
            TOOLS="$BASE"
          else
            TOOLS="$BASE,$EXTRA"
          fi
          echo "CLAUDE_ARGS=--max-turns ${{ inputs.max_turns }} --allowedTools $TOOLS --mcp-config /tmp/mcp-config.json" >> $GITHUB_ENV

      - name: Run Claude agent
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            AGENT_ROLE: ${{ inputs.agent_role }}
            Say hello and write done to /tmp/agent_result.json.
          claude_args: ${{ env.CLAUDE_ARGS }}
          settings: |
            {
              "env": {
                "AGENT_ROLE": "${{ inputs.agent_role }}",
                "GEMINI_API_KEY": "${{ secrets.GEMINI_API_KEY }}",
                "GITHUB_REPOSITORY": "${{ github.repository }}"
              }
            }

      - name: Read agent result
        id: read_result
        run: |
          if [ -f /tmp/agent_result.json ]; then
            RESULT=$(cat /tmp/agent_result.json | tr '\n' ' ')
            echo "result_json=$RESULT" >> $GITHUB_OUTPUT
            echo "status=complete" >> $GITHUB_OUTPUT
          else
            echo 'result_json={"status":"failed"}' >> $GITHUB_OUTPUT
            echo "status=failed" >> $GITHUB_OUTPUT
          fi

      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-result-${{ inputs.agent_role }}-${{ github.run_id }}
          path: /tmp/agent_result.json
          retention-days: 1
