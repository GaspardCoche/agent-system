name: Test Reusable Claude Min
on:
  workflow_call:
    inputs:
      agent_role:
        required: true
        type: string
      task_json:
        required: true
        type: string
      max_turns:
        required: false
        type: string
        default: "8"
      allowed_tools:
        required: false
        type: string
        default: "none"

jobs:
  run_agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Claude agent
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: "Role is ${{ inputs.agent_role }}. Say hello."
          claude_args: --max-turns 2 --allowedTools "Bash"
          settings: |
            {
              "env": {
                "AGENT_ROLE": "${{ inputs.agent_role }}",
                "GEMINI_API_KEY": "${{ secrets.GEMINI_API_KEY }}"
              }
            }
