name: Nexus — Google Ads Optimizer
on:
  schedule:
    - cron: '0 8 * * 1'  # Rapport hebdomadaire lundi 8h UTC
  workflow_dispatch:
    inputs:
      account_id:
        description: 'Google Ads account ID (MCC or single)'
        required: false
        type: string
      report_type:
        description: 'Type of report'
        required: false
        default: 'weekly_audit'
        type: choice
        options:
          - weekly_audit
          - campaign_audit
          - keyword_analysis
          - full_optimization
      dry_run:
        description: 'Audit only, do not apply changes'
        required: false
        default: 'true'
        type: string
  repository_dispatch:
    types: [nexus-audit, nexus-weekly]

jobs:
  nexus:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests google-ads google-genai -q

      - name: Pre-flight credential check
        id: preflight
        env:
          GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_CLIENT_ID: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_REFRESH_TOKEN: ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_ACCOUNT_ID: ${{ secrets.GOOGLE_ADS_ACCOUNT_ID }}
        run: |
          python3 << 'PYEOF'
          import os
          required = ["GOOGLE_ADS_DEVELOPER_TOKEN", "GOOGLE_ADS_CLIENT_ID",
                      "GOOGLE_ADS_CLIENT_SECRET", "GOOGLE_ADS_REFRESH_TOKEN"]
          missing = [s for s in required if not os.environ.get(s)]
          account_id = os.environ.get("GOOGLE_ADS_ACCOUNT_ID", "")
          if missing:
              print(f"⚠️  Missing required secrets: {', '.join(missing)}")
              print("Nexus will run in TEMPLATE mode (no real Google Ads data)")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("credentials_ok=false\n")
                  f.write(f"missing_secrets={','.join(missing)}\n")
          else:
              print(f"✅ All Google Ads credentials present (account: {account_id or 'not set'})")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("credentials_ok=true\n")
                  f.write("missing_secrets=\n")
          PYEOF

      - name: Build Nexus task
        run: |
          python3 << 'PYEOF'
          import json, os

          event_name = os.environ.get("GITHUB_EVENT_NAME", "workflow_dispatch")
          credentials_ok = os.environ.get("CREDENTIALS_OK", "false") == "true"
          missing_secrets = os.environ.get("MISSING_SECRETS", "")

          if event_name == "repository_dispatch":
              payload = json.loads(os.environ.get("CLIENT_PAYLOAD", "{}"))
              account_id = payload.get("account_id", os.environ.get("DEFAULT_ACCOUNT_ID", ""))
              report_type = payload.get("report_type", "weekly_audit")
              dry_run = payload.get("dry_run", True)
          else:
              account_id = os.environ.get("ACCOUNT_ID", os.environ.get("DEFAULT_ACCOUNT_ID", ""))
              report_type = os.environ.get("REPORT_TYPE", "weekly_audit")
              dry_run = os.environ.get("DRY_RUN", "true").lower() == "true"

          task = {
              "task_id": os.environ.get("GITHUB_RUN_ID", ""),
              "event": event_name,
              "account_id": account_id,
              "report_type": report_type,
              "dry_run": dry_run,
              "date_range": "last_30_days",
              "repository": os.environ.get("GITHUB_REPOSITORY", ""),
              "credentials_ok": credentials_ok,
              "missing_secrets": missing_secrets,
          }

          json.dump(task, open("/tmp/agent_task.json", "w"), indent=2)
          mode = "LIVE" if credentials_ok else "TEMPLATE (credentials missing)"
          print(f"Nexus task: account={account_id}, type={report_type}, dry_run={dry_run}, mode={mode}")
          PYEOF
        env:
          ACCOUNT_ID: ${{ inputs.account_id || '' }}
          REPORT_TYPE: ${{ inputs.report_type || 'weekly_audit' }}
          DRY_RUN: ${{ inputs.dry_run || 'true' }}
          DEFAULT_ACCOUNT_ID: ${{ secrets.GOOGLE_ADS_ACCOUNT_ID }}
          CLIENT_PAYLOAD: ${{ toJSON(github.event.client_payload) }}
          CREDENTIALS_OK: ${{ steps.preflight.outputs.credentials_ok }}
          MISSING_SECRETS: ${{ steps.preflight.outputs.missing_secrets }}

      - name: Write MCP config
        run: |
          printf '{"mcpServers":{"github":{"command":"npx","args":["-y","@modelcontextprotocol/server-github"],"env":{"GITHUB_PERSONAL_ACCESS_TOKEN":"PLACEHOLDER"}},"memory":{"command":"npx","args":["-y","@modelcontextprotocol/server-memory"],"env":{}}}}' \
            > /tmp/mcp-config.json
          sed -i "s/PLACEHOLDER/${{ secrets.GITHUB_TOKEN }}/g" /tmp/mcp-config.json

      - name: Install MCP servers
        run: npm install -g @modelcontextprotocol/server-github @modelcontextprotocol/server-memory

      - name: Run Nexus agent
        uses: anthropics/claude-code-action@v1
        continue-on-error: true
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Read agent_prompts/nexus.md.
            Task is in /tmp/agent_task.json.
            IMPORTANT: Check task.credentials_ok first.
            - If false: generate a template report clearly marked as TEMPLATE MODE. List missing secrets in the report. Do NOT waste turns trying API calls that will fail.
            - If true: execute the full Google Ads audit and optimization cycle.
            If dry_run=true, only generate the audit report and preview.
            Always post a preview comment before applying changes.
            Write results to /tmp/agent_result.json.
          claude_args: --max-turns 12 --allowedTools "Bash,Read,Write,mcp__github__add_issue_comment,mcp__github__create_issue,mcp__memory__add_observations,mcp__memory__search_nodes" --mcp-config /tmp/mcp-config.json
          settings: |
            {
              "env": {
                "GOOGLE_ADS_DEVELOPER_TOKEN": "${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}",
                "GOOGLE_ADS_CLIENT_ID": "${{ secrets.GOOGLE_ADS_CLIENT_ID }}",
                "GOOGLE_ADS_CLIENT_SECRET": "${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}",
                "GOOGLE_ADS_REFRESH_TOKEN": "${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}",
                "GEMINI_API_KEY": "${{ secrets.GEMINI_API_KEY }}",
                "GITHUB_REPOSITORY": "${{ github.repository }}"
              }
            }

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: agent-result-nexus-${{ github.run_id }}
          path: /tmp/agent_result.json
          retention-days: 7

      - name: Generate report + update dashboard
        if: always()
        env:
          REPO: ${{ github.repository }}
          REPORT_TYPE: ${{ inputs.report_type || 'weekly_audit' }}
        run: |
          mkdir -p /tmp/nexus_results
          cp /tmp/agent_result.json /tmp/nexus_results/agent_result.json 2>/dev/null || true
          STATUS="success"
          python3 -c "import json,sys; d=json.load(open('/tmp/agent_result.json')); sys.exit(0 if d.get('status')=='complete' else 1)" 2>/dev/null || STATUS="failed"
          python3 .github/scripts/generate_report.py \
            --run-id "${{ github.run_id }}" \
            --workflow "nexus" \
            --title "Nexus $REPORT_TYPE $(date +%Y-%m-%d)" \
            --status "$STATUS" \
            --event "${{ github.event_name }}" \
            --repo "$REPO" \
            --results-dir /tmp/nexus_results \
            --output-dir docs/reports \
            --dashboard-file docs/data/runs.json

      - name: Commit report and dashboard
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Rebuild knowledge graph if vault was updated
          if [ -d docs/vault ]; then
            python3 .github/scripts/vault_builder.py --vault-dir docs/vault --output docs/data/graph.json 2>/dev/null || true
          fi
          git add docs/reports/ docs/data/runs.json docs/data/graph.json docs/vault/ reports/
          git diff --cached --quiet || git commit -m "report: nexus run ${{ github.run_id }} [$(date +%Y-%m-%d)]"
          git push

      - name: Send Slack notification
        if: always() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          REPORT_TYPE: ${{ inputs.report_type || 'weekly_audit' }}
        run: |
          RUN_URL="https://github.com/$REPO/actions/runs/$RUN_ID"
          PAYLOAD="{\"text\":\"📊 *Nexus* — $REPORT_TYPE completed · <${RUN_URL}|Run #${RUN_ID}>\"}"
          curl -s -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"
