name: Nexus — Google Ads Optimizer
on:
  schedule:
    - cron: '0 8 * * 1'  # Rapport hebdomadaire lundi 8h UTC
  workflow_dispatch:
    inputs:
      account_id:
        description: 'Google Ads account ID (MCC or single)'
        required: false
        type: string
      report_type:
        description: 'Type of report'
        required: false
        default: 'weekly_audit'
        type: choice
        options:
          - weekly_audit
          - campaign_audit
          - keyword_analysis
          - full_optimization
      dry_run:
        description: 'Audit only, do not apply changes'
        required: false
        default: 'true'
        type: string
  repository_dispatch:
    types: [nexus-audit, nexus-weekly]

jobs:
  nexus:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests google-ads google-genai -q

      - name: Build Nexus task
        run: |
          python3 << 'PYEOF'
          import json, os

          event_name = os.environ.get("GITHUB_EVENT_NAME", "workflow_dispatch")

          if event_name == "repository_dispatch":
              payload = json.loads(os.environ.get("CLIENT_PAYLOAD", "{}"))
              account_id = payload.get("account_id", os.environ.get("DEFAULT_ACCOUNT_ID", ""))
              report_type = payload.get("report_type", "weekly_audit")
              dry_run = payload.get("dry_run", True)
          else:
              account_id = os.environ.get("ACCOUNT_ID", os.environ.get("DEFAULT_ACCOUNT_ID", ""))
              report_type = os.environ.get("REPORT_TYPE", "weekly_audit")
              dry_run = os.environ.get("DRY_RUN", "true").lower() == "true"

          task = {
              "task_id": os.environ.get("GITHUB_RUN_ID", ""),
              "event": event_name,
              "account_id": account_id,
              "report_type": report_type,
              "dry_run": dry_run,
              "date_range": "last_30_days",
              "repository": os.environ.get("GITHUB_REPOSITORY", ""),
          }

          json.dump(task, open("/tmp/agent_task.json", "w"), indent=2)
          print(f"Nexus task: account={account_id}, type={report_type}, dry_run={dry_run}")
          PYEOF
        env:
          ACCOUNT_ID: ${{ inputs.account_id || '' }}
          REPORT_TYPE: ${{ inputs.report_type || 'weekly_audit' }}
          DRY_RUN: ${{ inputs.dry_run || 'true' }}
          DEFAULT_ACCOUNT_ID: ${{ secrets.GOOGLE_ADS_ACCOUNT_ID }}
          CLIENT_PAYLOAD: ${{ toJSON(github.event.client_payload) }}

      - name: Write MCP config
        run: |
          printf '{"mcpServers":{"github":{"command":"npx","args":["-y","@modelcontextprotocol/server-github"],"env":{"GITHUB_PERSONAL_ACCESS_TOKEN":"PLACEHOLDER"}},"memory":{"command":"npx","args":["-y","@modelcontextprotocol/server-memory"],"env":{}}}}' \
            > /tmp/mcp-config.json
          sed -i "s/PLACEHOLDER/${{ secrets.GITHUB_TOKEN }}/g" /tmp/mcp-config.json

      - name: Install MCP servers
        run: npm install -g @modelcontextprotocol/server-github @modelcontextprotocol/server-memory

      - name: Run Nexus agent
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Read agent_prompts/nexus.md.
            Task is in /tmp/agent_task.json.
            Execute the Google Ads audit and optimization cycle.
            If dry_run=true, only generate the audit report and preview.
            Always post a preview comment before applying changes.
            Write results to /tmp/agent_result.json.
          claude_args: --max-turns 12 --allowedTools "Bash,Read,Write,mcp__github__add_issue_comment,mcp__github__create_issue,mcp__memory__add_observations,mcp__memory__search_nodes" --mcp-config /tmp/mcp-config.json
          settings: |
            {
              "env": {
                "GOOGLE_ADS_DEVELOPER_TOKEN": "${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}",
                "GOOGLE_ADS_CLIENT_ID": "${{ secrets.GOOGLE_ADS_CLIENT_ID }}",
                "GOOGLE_ADS_CLIENT_SECRET": "${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}",
                "GOOGLE_ADS_REFRESH_TOKEN": "${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}",
                "GEMINI_API_KEY": "${{ secrets.GEMINI_API_KEY }}",
                "GITHUB_REPOSITORY": "${{ github.repository }}"
              }
            }

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: agent-result-nexus-${{ github.run_id }}
          path: /tmp/agent_result.json
          retention-days: 7
