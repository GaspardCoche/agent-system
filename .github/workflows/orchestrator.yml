name: Orchestrator
on:
  issues:
    types: [labeled]
  pull_request:
    types: [opened, synchronize]
  schedule:
    - cron: '0 8 * * 1-5'
  workflow_dispatch:
    inputs:
      task_description:
        description: 'Task description'
        required: true
        type: string

concurrency:
  group: orchestrator-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      task_json:  ${{ steps.build.outputs.task_json }}
    steps:
      - name: Check trigger conditions
        id: check
        run: |
          EVENT="${{ github.event_name }}"
          if [[ "$EVENT" == "workflow_dispatch" || "$EVENT" == "schedule" ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [[ "$EVENT" == "issues" ]]; then
            LABELS='${{ toJSON(github.event.issue.labels.*.name) }}'
            if echo "$LABELS" | grep -q '"agent"'; then
              echo "should_run=true" >> $GITHUB_OUTPUT
            else
              echo "should_run=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi

      - name: Build task JSON
        id: build
        if: steps.check.outputs.should_run == 'true'
        env:
          TASK_ID: ${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
          EVENT_NAME: ${{ github.event_name }}
          REPOSITORY: ${{ github.repository }}
          DESCRIPTION: ${{ github.event.issue.body || github.event.pull_request.body || inputs.task_description || 'Scheduled maintenance' }}
          TITLE: ${{ github.event.issue.title || github.event.pull_request.title || 'Scheduled' }}
          REF: ${{ github.sha }}
          ISSUE_NUMBER: ${{ github.event.issue.number || '' }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
        run: |
          python3 << 'PYEOF'
          import json, os
          task = {
              "task_id":      os.environ.get("TASK_ID", ""),
              "event":        os.environ.get("EVENT_NAME", ""),
              "repository":   os.environ.get("REPOSITORY", ""),
              "description":  os.environ.get("DESCRIPTION", ""),
              "title":        os.environ.get("TITLE", ""),
              "ref":          os.environ.get("REF", ""),
              "issue_number": os.environ.get("ISSUE_NUMBER", ""),
              "pr_number":    os.environ.get("PR_NUMBER", ""),
          }
          with open("/tmp/task.json", "w") as f:
              json.dump(task, f)
          PYEOF
          echo "task_json=$(cat /tmp/task.json)" >> $GITHUB_OUTPUT

  orchestrate:
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      dispatch_plan: ${{ steps.read_plan.outputs.dispatch_plan }}

    steps:
      - uses: actions/checkout@v4

      - name: Install MCP servers
        run: |
          npm install -g \
            @modelcontextprotocol/server-github \
            @modelcontextprotocol/server-memory

      - name: Write task
        env:
          TASK_JSON: ${{ needs.gate.outputs.task_json }}
        run: printf '%s' "$TASK_JSON" > /tmp/agent_task.json

      - name: Write MCP config
        env:
          GH_TOKEN_MCP: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 -c "
          import json, os
          cfg = {'mcpServers': {
            'github': {'command': 'npx', 'args': ['-y', '@modelcontextprotocol/server-github'], 'env': {'GITHUB_PERSONAL_ACCESS_TOKEN': os.environ['GH_TOKEN_MCP']}},
            'memory': {'command': 'npx', 'args': ['-y', '@modelcontextprotocol/server-memory'], 'env': {}}
          }}
          json.dump(cfg, open('/tmp/mcp-config.json', 'w'))
          "

      - name: Build claude_args
        run: |
          echo "CLAUDE_ARGS=--max-turns 8 --allowedTools Bash,Read,Write,mcp__github__add_issue_comment,mcp__memory__add_observations --mcp-config /tmp/mcp-config.json" >> $GITHUB_ENV

      - name: Run orchestrator (Claude)
        uses: anthropics/claude-code-action@v1
        continue-on-error: true
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Read agent_prompts/dispatch.md (or orchestrator.md if dispatch.md not found).
            Task is in /tmp/agent_task.json.
            Decompose into a dispatch plan and write it to /tmp/dispatch_plan.json.
            If issue_number is set, post a brief planning comment on the issue.
          claude_args: ${{ env.CLAUDE_ARGS }}
          settings: |
            {"env": {"GEMINI_API_KEY": "${{ secrets.GEMINI_API_KEY }}", "GITHUB_REPOSITORY": "${{ github.repository }}"}}

      - name: Verify and read dispatch plan
        id: read_plan
        run: |
          if [ -f /tmp/dispatch_plan.json ]; then
            echo "✅ dispatch_plan.json found"
            PLAN=$(cat /tmp/dispatch_plan.json | tr '\n' ' ')
          else
            echo "⚠️  dispatch_plan.json not found — using fallback plan"
            PLAN='{"task_id":"${{ github.run_id }}","agents":[{"role":"forge","input":"See task in context","parallel":false}]}'
          fi
          echo "dispatch_plan=$PLAN" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dispatch-plan-${{ github.run_id }}
          path: /tmp/dispatch_plan.json
          retention-days: 7

  # ── Parallel phase ──────────────────────────────────────────────────────────

  run-researcher:
    needs: orchestrate
    permissions:
      contents: write
      pull-requests: write
      issues: write
    uses: ./.github/workflows/_reusable-claude.yml
    with:
      agent_role: researcher
      task_json: ${{ needs.orchestrate.outputs.dispatch_plan }}
      max_turns: "8"
      allowed_tools: mcp__firecrawl__firecrawl_scrape,mcp__playwright__playwright_navigate,mcp__playwright__playwright_get_visible_text
    secrets: inherit

  run-analyzer:
    needs: orchestrate
    permissions:
      contents: write
      pull-requests: write
      issues: write
    uses: ./.github/workflows/_reusable-claude.yml
    with:
      agent_role: lumen
      task_json: ${{ needs.orchestrate.outputs.dispatch_plan }}
      max_turns: "8"
      allowed_tools: none
    secrets: inherit

  # ── Sequential phase ────────────────────────────────────────────────────────

  run-coder:
    needs: [orchestrate, run-researcher, run-analyzer]
    if: always() && needs.orchestrate.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: agent-result-*-${{ github.run_id }}
          path: /tmp/prior_results/
        continue-on-error: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install google-genai -q

      - name: Compress context for coder
        env:
          DISPATCH_PLAN: ${{ needs.orchestrate.outputs.dispatch_plan }}
        run: |
          echo "$DISPATCH_PLAN" > /tmp/dispatch_plan_for_coder.json
          python3 .github/scripts/context_compressor.py \
            --inputs /tmp/prior_results/ \
            --output /tmp/agent_task.json \
            --task-file /tmp/dispatch_plan_for_coder.json \
            --max-tokens 8000

      - name: Install MCP servers
        run: |
          npm install -g \
            @modelcontextprotocol/server-filesystem \
            @modelcontextprotocol/server-github \
            @modelcontextprotocol/server-memory

      - name: Write MCP config
        env:
          GH_TOKEN_MCP: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 -c "
          import json, os
          cfg = {'mcpServers': {
            'filesystem': {'command': 'npx', 'args': ['-y', '@modelcontextprotocol/server-filesystem', '/home/runner/work'], 'env': {}},
            'github': {'command': 'npx', 'args': ['-y', '@modelcontextprotocol/server-github'], 'env': {'GITHUB_PERSONAL_ACCESS_TOKEN': os.environ['GH_TOKEN_MCP']}},
            'memory': {'command': 'npx', 'args': ['-y', '@modelcontextprotocol/server-memory'], 'env': {}}
          }}
          json.dump(cfg, open('/tmp/mcp-config.json', 'w'))
          "

      - name: Build claude_args
        run: |
          echo "CLAUDE_ARGS=--max-turns 15 --allowedTools Bash,Read,Write,Edit,mcp__filesystem__read_file,mcp__filesystem__write_file,mcp__github__add_issue_comment,mcp__memory__add_observations,mcp__memory__search_nodes --mcp-config /tmp/mcp-config.json" >> $GITHUB_ENV

      - name: Run coder agent (Claude)
        uses: anthropics/claude-code-action@v1
        continue-on-error: true
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Read agent_prompts/forge.md (or coder.md if forge.md not found).
            Context from prior agents is in /tmp/agent_task.json.
            Implement the required changes. Self-correct until tests pass (max 3 cycles).
            Write results to /tmp/agent_result.json.
          claude_args: ${{ env.CLAUDE_ARGS }}
          settings: |
            {"env": {"GEMINI_API_KEY": "${{ secrets.GEMINI_API_KEY }}", "GITHUB_REPOSITORY": "${{ github.repository }}"}}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: agent-result-coder-${{ github.run_id }}
          path: /tmp/agent_result.json
          retention-days: 7

  run-tester:
    needs: run-coder
    if: always() && needs.run-coder.result == 'success'
    permissions:
      contents: write
      pull-requests: write
      issues: write
    uses: ./.github/workflows/_reusable-claude.yml
    with:
      agent_role: sentinel
      task_json: '{"task_id":"${{ github.run_id }}","role":"sentinel","instruction":"Run tests on recent coder changes, fix test issues, report coverage."}'
      max_turns: "10"
      allowed_tools: none
    secrets: inherit

  # ── Final summary ────────────────────────────────────────────────────────────

  aggregate:
    needs: [orchestrate, run-tester]
    if: always() && needs.orchestrate.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: agent-result-*-${{ github.run_id }}
          path: /tmp/all_results/
        continue-on-error: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compute overall status
        id: status
        run: |
          TESTER="${{ needs.run-tester.result }}"
          if [[ "$TESTER" == "success" ]]; then
            echo "overall=success" >> $GITHUB_OUTPUT
          elif [[ "$TESTER" == "skipped" || "$TESTER" == "cancelled" ]]; then
            echo "overall=partial" >> $GITHUB_OUTPUT
          else
            echo "overall=failed" >> $GITHUB_OUTPUT
          fi

      - name: Generate report + update dashboard
        continue-on-error: true
        env:
          TITLE: ${{ github.event.issue.title || github.event.pull_request.title || 'Scheduled run' }}
          REPO: ${{ github.repository }}
        run: |
          python3 .github/scripts/generate_report.py \
            --run-id "${{ github.run_id }}" \
            --workflow "orchestrator" \
            --title "$TITLE" \
            --status "${{ steps.status.outputs.overall }}" \
            --event "${{ github.event_name }}" \
            --repo "$REPO" \
            --results-dir /tmp/all_results \
            --output-dir docs/reports \
            --dashboard-file docs/data/runs.json \
            --task-id "${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}"

      - name: Commit report and dashboard
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/reports/ docs/data/runs.json reports/
          git diff --cached --quiet && exit 0
          git commit -m "report: orchestrator run ${{ github.run_id }} [${{ steps.status.outputs.overall }}]"
          for i in 1 2 3; do
            git pull --rebase -X theirs origin main && git push && exit 0
            echo "⚠️ Push attempt $i failed, retrying..."
            git rebase --abort 2>/dev/null || true
            sleep 3
          done
          echo "⚠️ Report commit failed — non-critical"

      - name: Install MCP servers
        run: npm install -g @modelcontextprotocol/server-github

      - name: Write MCP config
        env:
          GH_TOKEN_MCP: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 -c "
          import json, os
          cfg = {'mcpServers': {
            'github': {'command': 'npx', 'args': ['-y', '@modelcontextprotocol/server-github'], 'env': {'GITHUB_PERSONAL_ACCESS_TOKEN': os.environ['GH_TOKEN_MCP']}}
          }}
          json.dump(cfg, open('/tmp/mcp-config.json', 'w'))
          "

      - name: Build claude_args
        run: |
          echo "CLAUDE_ARGS=--max-turns 3 --allowedTools Bash,Read,mcp__github__add_issue_comment --mcp-config /tmp/mcp-config.json" >> $GITHUB_ENV

      - name: Post final summary (Claude)
        if: github.event.issue.number || github.event.pull_request.number
        uses: anthropics/claude-code-action@v1
        continue-on-error: true
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Run: find /tmp/all_results -name '*.json' -exec cat {} \; 2>/dev/null || echo 'no results'
            Post a concise summary comment on issue/PR #${{ github.event.issue.number || github.event.pull_request.number }}.
            Format as a markdown table with Agent / Status / Summary columns.
          claude_args: ${{ env.CLAUDE_ARGS }}
          settings: |
            {"env": {"GH_TOKEN": "${{ secrets.GITHUB_TOKEN }}"}}

      - name: Send Slack notification
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          STATUS: ${{ steps.status.outputs.overall }}
          TITLE: ${{ github.event.issue.title || github.event.pull_request.title || 'Scheduled run' }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          RUN_URL="https://github.com/$REPO/actions/runs/$RUN_ID"
          python3 << 'PYEOF'
          import json, os, subprocess
          status = os.environ["STATUS"]
          title = os.environ["TITLE"]
          run_url = os.environ["RUN_URL"]
          run_id = os.environ["RUN_ID"]
          emoji = {"success": "✅", "partial": "⚠️"}.get(status, "❌")
          payload = json.dumps({"text": f"{emoji} *Orchestrator* [{status}] — {title} · <{run_url}|Run #{run_id}>"})
          subprocess.run(["curl", "-s", "-X", "POST", "-H", "Content-type: application/json",
                          "--data", payload, os.environ["SLACK_WEBHOOK_URL"]])
          PYEOF
