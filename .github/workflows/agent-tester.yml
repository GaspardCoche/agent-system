name: Agent Tester (PR)
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Write task
        run: |
          python3 << 'PYEOF'
          import json, os
          task = {
              "task_id": os.environ.get("PR_NUMBER", ""),
              "role": "sentinel",
              "pr_number": os.environ.get("PR_NUMBER", ""),
              "pr_title": os.environ.get("PR_TITLE", ""),
              "base_sha": os.environ.get("BASE_SHA", ""),
              "head_sha": os.environ.get("HEAD_SHA", ""),
          }
          with open("/tmp/agent_task.json", "w") as f:
              json.dump(task, f)
          PYEOF
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}

      - name: Install MCP servers
        run: npm install -g @modelcontextprotocol/server-github

      - name: Write MCP config
        run: |
          printf '{"mcpServers":{"github":{"command":"npx","args":["-y","@modelcontextprotocol/server-github"],"env":{"GITHUB_PERSONAL_ACCESS_TOKEN":"PLACEHOLDER"}}}}' \
            > /tmp/mcp-config.json
          sed -i "s/PLACEHOLDER/${{ secrets.GITHUB_TOKEN }}/g" /tmp/mcp-config.json

      - name: Build claude_args
        run: |
          echo "CLAUDE_ARGS=--max-turns 10 --allowedTools Bash,Read,Write,Edit,mcp__github__add_issue_comment,mcp__github__get_pull_request_files --mcp-config /tmp/mcp-config.json" >> $GITHUB_ENV

      - name: Run Sentinel agent (Claude)
        uses: anthropics/claude-code-action@v1
        continue-on-error: true
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Read agent_prompts/sentinel.md.
            Task: /tmp/agent_task.json
            PR: #${{ github.event.pull_request.number }}
            1. Get changed files: Bash("git diff --name-only ${{ github.event.pull_request.base.sha }} HEAD")
            2. Run the test suite.
            3. Write results to /tmp/agent_result.json (include a "retrospective" field).
            4. Post a summary comment on the PR.
          claude_args: ${{ env.CLAUDE_ARGS }}

      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-result-sentinel-${{ github.run_id }}
          path: /tmp/agent_result.json
          retention-days: 7
