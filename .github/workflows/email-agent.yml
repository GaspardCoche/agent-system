name: Email Agent (Daily Digest)
on:
  schedule:
    - cron: '30 7 * * 1-5'
    - cron: '30 9 * * 6,0'
  workflow_dispatch:
    inputs:
      hours_back:
        description: 'Hours of emails to process'
        required: false
        default: '24'
        type: string
      skip_ai_digest:
        description: 'Skip AI news scraping'
        required: false
        default: 'false'
        type: string

jobs:
  fetch-emails:
    runs-on: ubuntu-latest
    outputs:
      email_count: ${{ steps.fetch.outputs.email_count }}
      gmail_configured: ${{ steps.check.outputs.gmail_configured }}
    steps:
      - uses: actions/checkout@v4

      - name: Check Gmail secrets
        id: check
        env:
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
        run: |
          if [ -z "$GMAIL_TOKEN_JSON" ]; then
            echo "gmail_configured=false" >> $GITHUB_OUTPUT
            echo "⚠️  GMAIL_TOKEN_JSON not set — skipping email fetch"
          else
            echo "gmail_configured=true" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-python@v5
        if: steps.check.outputs.gmail_configured == 'true'
        with:
          python-version: '3.12'

      - run: pip install google-auth google-auth-oauthlib google-api-python-client -q
        if: steps.check.outputs.gmail_configured == 'true'

      - name: Fetch emails
        id: fetch
        if: steps.check.outputs.gmail_configured == 'true'
        env:
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          GMAIL_USER_EMAIL: ${{ secrets.GMAIL_USER_EMAIL }}
        run: |
          python3 .github/scripts/gmail_client.py \
            --hours-back ${{ inputs.hours_back || '24' }} \
            --output /tmp/raw_emails.json
          COUNT=$(python3 -c "import json; print(len(json.load(open('/tmp/raw_emails.json'))))")
          echo "email_count=$COUNT" >> $GITHUB_OUTPUT

      - name: Skip — Gmail not configured
        if: steps.check.outputs.gmail_configured == 'false'
        run: |
          echo '[]' > /tmp/raw_emails.json
          echo "email_count=0" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: raw-emails-${{ github.run_id }}
          path: /tmp/raw_emails.json
          retention-days: 7

  scrape-ai-news:
    runs-on: ubuntu-latest
    if: ${{ inputs.skip_ai_digest != 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install google-genai requests -q

      - name: Scrape AI news
        continue-on-error: true
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: python3 .github/scripts/ai_news_scraper.py

      - name: Synthesize with Gemini (structured digest)
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -f /tmp/ai_news_raw.txt ] && [ -s /tmp/ai_news_raw.txt ]; then
            python3 .github/scripts/gemini_agent.py \
              --task ai_digest \
              --input /tmp/ai_news_raw.txt \
              --output /tmp/ai_digest.json
          else
            echo '{"headline": "Pas de contenu scraped", "articles": [], "trends": [], "one_liner": "Scraping echoue", "stats": {"sources_scraped": 0, "articles_extracted": 0}}' > /tmp/ai_digest.json
            echo "⚠️  No AI news scraped — wrote fallback digest"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ai-digest-${{ github.run_id }}
          path: /tmp/ai_digest.json
          retention-days: 7

  triage-emails:
    needs: fetch-emails
    if: needs.fetch-emails.outputs.gmail_configured == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: raw-emails-${{ github.run_id }}
          path: /tmp/

      - name: Install MCP servers
        run: npm install -g @modelcontextprotocol/server-memory

      - name: Write MCP config
        run: |
          printf '{"mcpServers":{"memory":{"command":"npx","args":["-y","@modelcontextprotocol/server-memory"],"env":{}}}}' \
            > /tmp/mcp-config.json

      - name: Build claude_args
        run: |
          echo "CLAUDE_ARGS=--max-turns 8 --allowedTools Bash,Read,Write --mcp-config /tmp/mcp-config.json" >> $GITHUB_ENV

      - name: Triage emails (Claude / Iris)
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Read agent_prompts/iris.md (fallback: agent_prompts/email-triage.md).
            Raw emails are in /tmp/raw_emails.json.
            Your email: ${{ secrets.GMAIL_USER_EMAIL }}
            Internal domain: ${{ secrets.INTERNAL_EMAIL_DOMAIN || 'none' }}
            Classify each email and write /tmp/email_triage.json.
          claude_args: ${{ env.CLAUDE_ARGS }}
          settings: |
            {"env": {"AGENT_ROLE": "iris"}}

      - uses: actions/upload-artifact@v4
        with:
          name: email-triage-${{ github.run_id }}
          path: /tmp/email_triage.json
          retention-days: 7

  create-drafts:
    needs: triage-emails
    if: needs.triage-emails.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install google-auth google-auth-oauthlib google-api-python-client -q

      - uses: actions/download-artifact@v4
        with:
          name: email-triage-${{ github.run_id }}
          path: /tmp/

      - name: Create Gmail drafts
        env:
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          GMAIL_USER_EMAIL: ${{ secrets.GMAIL_USER_EMAIL }}
        run: |
          python3 .github/scripts/gmail_client.py \
            --create-drafts \
            --triage-file /tmp/email_triage.json

  post-digest:
    needs: [fetch-emails, triage-emails, scrape-ai-news, create-drafts]
    if: always() && needs.fetch-emails.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: "*-${{ github.run_id }}"
          path: /tmp/artifacts/
        continue-on-error: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install google-auth google-auth-oauthlib google-api-python-client markdown -q

      - name: Prepare digest data
        run: |
          # Move ai_digest.json to /tmp if available in artifacts
          find /tmp/artifacts -name 'ai_digest.json' -exec cp {} /tmp/ai_digest.json \; 2>/dev/null || true
          if [ -f /tmp/ai_digest.json ]; then
            echo "✅ AI digest found"
            python3 -c "import json; d=json.load(open('/tmp/ai_digest.json')); print(f\"  {len(d.get('articles',[]))} articles, headline: {d.get('headline','?')[:80]}\")"
          else
            echo "⚠️  No AI digest found"
          fi

      - name: Install MCP servers
        run: npm install -g @modelcontextprotocol/server-github

      - name: Write MCP config
        env:
          GH_TOKEN_MCP: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 -c "
          import json, os
          cfg = {'mcpServers': {
            'github': {'command': 'npx', 'args': ['-y', '@modelcontextprotocol/server-github'], 'env': {'GITHUB_PERSONAL_ACCESS_TOKEN': os.environ['GH_TOKEN_MCP']}}
          }}
          json.dump(cfg, open('/tmp/mcp-config.json', 'w'))
          "

      - name: Build claude_args
        run: |
          echo "CLAUDE_ARGS=--max-turns 6 --allowedTools Bash,Read,Write --mcp-config /tmp/mcp-config.json" >> $GITHUB_ENV

      - name: Generate and post digest (Claude)
        uses: anthropics/claude-code-action@v1
        continue-on-error: true
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Read the AI digest and email data, then create a GitHub issue digest.

            Bash("cat /tmp/ai_digest.json 2>/dev/null || echo 'no ai digest'")
            Bash("find /tmp/artifacts -name '*.json' 2>/dev/null | head -5 | xargs -I{} sh -c 'echo \"--- {} ---\" && head -50 {}' 2>/dev/null || echo 'no artifacts'")

            Write a daily digest to /tmp/digest_body.md. Use the structured AI digest JSON to create a rich markdown summary:
            - For each article, include: title as a link, source, importance indicator, summary
            - Group by importance: must_read first, then important, then worth_noting
            - Include the headline and trends at the top
            - If email triage data exists, include email sections too

            Then create a GitHub issue:
            Bash("gh issue create --title '📧 Daily Digest — $(date +%Y-%m-%d)' --label 'digest' --body-file /tmp/digest_body.md --repo $GITHUB_REPOSITORY")
          claude_args: ${{ env.CLAUDE_ARGS }}
          settings: |
            {"env": {"GH_TOKEN": "${{ secrets.GITHUB_TOKEN }}", "GITHUB_REPOSITORY": "${{ github.repository }}"}}

      - name: Send digest by email (HTML newsletter)
        if: needs.fetch-emails.outputs.gmail_configured == 'true'
        continue-on-error: true
        env:
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          GMAIL_USER_EMAIL: ${{ secrets.GMAIL_USER_EMAIL }}
        run: |
          if [ -f /tmp/ai_digest.json ]; then
            python3 .github/scripts/gmail_send_digest.py /tmp/ai_digest.json /tmp/digest_body.md
          elif [ -f /tmp/digest_body.md ]; then
            python3 .github/scripts/gmail_send_digest.py /dev/null /tmp/digest_body.md
          else
            echo "⚠️  No digest content found — skipping email send"
          fi

      - name: Generate report + update dashboard
        continue-on-error: true
        env:
          REPO: ${{ github.repository }}
          EMAIL_COUNT: ${{ needs.fetch-emails.outputs.email_count }}
        run: |
          STATUS="success"
          [ "${{ needs.triage-emails.result }}" = "failure" ] && STATUS="failed"
          python3 .github/scripts/generate_report.py \
            --run-id "${{ github.run_id }}" \
            --workflow "email-agent" \
            --title "Daily Digest $(date +%Y-%m-%d)" \
            --status "$STATUS" \
            --event "${{ github.event_name }}" \
            --repo "$REPO" \
            --results-dir /tmp/artifacts \
            --output-dir docs/reports \
            --dashboard-file docs/data/runs.json \
            --summary "$EMAIL_COUNT emails traités"

      - name: Commit report and dashboard
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/reports/ docs/data/runs.json reports/
          git diff --cached --quiet && exit 0
          git commit -m "report: email-agent $(date +%Y-%m-%d) [run ${{ github.run_id }}]"
          for i in 1 2 3; do
            git pull --rebase -X theirs origin main && git push && exit 0
            echo "⚠️ Push attempt $i failed, retrying..."
            git rebase --abort 2>/dev/null || true
            sleep 3
          done
          echo "⚠️ Report commit failed — non-critical, digest was sent successfully"

      - name: Send Slack notification
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          EMAIL_COUNT: ${{ needs.fetch-emails.outputs.email_count }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          RUN_URL="https://github.com/$REPO/actions/runs/$RUN_ID"
          PAYLOAD="{\"text\":\"📧 *Daily Digest* — ${EMAIL_COUNT} emails · <${RUN_URL}|Run #${RUN_ID}>\"}"
          curl -s -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"
