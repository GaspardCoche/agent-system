name: 📧 Email Agent (Daily Digest)
on:
  schedule:
    - cron: '30 7 * * 1-5'    # 7h30 lun-ven
    - cron: '30 9 * * 6,0'    # 9h30 week-end
  workflow_dispatch:
    inputs:
      hours_back:
        description: 'Hours of emails to process'
        required: false
        default: '24'
        type: string
      skip_ai_digest:
        description: 'Skip AI news scraping'
        required: false
        default: 'false'
        type: string

jobs:
  # ─── Step 1: Fetch emails + scrape AI news in parallel ─────────────────────

  fetch-emails:
    runs-on: ubuntu-latest
    outputs:
      email_count: ${{ steps.fetch.outputs.email_count }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Gmail deps
        run: pip install google-auth google-auth-oauthlib google-api-python-client

      - name: Fetch emails
        id: fetch
        run: |
          python3 .github/scripts/gmail_client.py \
            --hours-back ${{ inputs.hours_back || '24' }} \
            --output /tmp/raw_emails.json
          COUNT=$(python3 -c "import json; print(len(json.load(open('/tmp/raw_emails.json'))))")
          echo "email_count=$COUNT" >> $GITHUB_OUTPUT
          echo "Fetched $COUNT emails"
        env:
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          GMAIL_USER_EMAIL: ${{ secrets.GMAIL_USER_EMAIL }}

      - uses: actions/upload-artifact@v4
        with:
          name: raw-emails-${{ github.run_id }}
          path: /tmp/raw_emails.json
          retention-days: 1

  scrape-ai-news:
    runs-on: ubuntu-latest
    if: inputs.skip_ai_digest != 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install google-genai

      - name: Scrape AI sources
        run: python3 .github/scripts/ai_news_scraper.py
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}

      - name: Synthesize with Gemini
        run: |
          python3 .github/scripts/gemini_agent.py \
            --task synthesize \
            --input /tmp/ai_news_raw.txt \
            --output /tmp/ai_digest.json
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - uses: actions/upload-artifact@v4
        with:
          name: ai-digest-${{ github.run_id }}
          path: /tmp/ai_digest.json
          retention-days: 1

  # ─── Step 2: Triage emails with Claude ─────────────────────────────────────

  triage-emails:
    needs: fetch-emails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: raw-emails-${{ github.run_id }}
          path: /tmp/

      - name: Inject MCP config
        run: |
          printf '{"mcpServers":{"memory":{"command":"npx","args":["-y","@modelcontextprotocol/server-memory"],"env":{}}}}' \
            > /tmp/mcp-config.json

      - name: Triage emails (Claude)
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Read agent_prompts/email-triage.md carefully.

            Raw emails are in /tmp/raw_emails.json.
            Your email address: ${{ secrets.GMAIL_USER_EMAIL }}
            Internal domain: ${{ secrets.INTERNAL_EMAIL_DOMAIN || 'none' }}

            1. Read and classify each email following the triage rules.
            2. Write /tmp/email_triage.json with the full structured output.
          claude_args: |
            --max-turns 8
            --mcp-config /tmp/mcp-config.json
            --allowedTools "Bash,Read,Write"
          settings: |
            {"env": {"AGENT_ROLE": "email-triage"}}

      - uses: actions/upload-artifact@v4
        with:
          name: email-triage-${{ github.run_id }}
          path: /tmp/email_triage.json
          retention-days: 1

  # ─── Step 3: Create Gmail drafts ───────────────────────────────────────────

  create-drafts:
    needs: triage-emails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install google-auth google-auth-oauthlib google-api-python-client

      - uses: actions/download-artifact@v4
        with:
          name: email-triage-${{ github.run_id }}
          path: /tmp/

      - name: Create Gmail drafts for suggested replies
        run: |
          python3 .github/scripts/gmail_client.py \
            --create-drafts \
            --triage-file /tmp/email_triage.json
        env:
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          GMAIL_USER_EMAIL: ${{ secrets.GMAIL_USER_EMAIL }}

  # ─── Step 4: Post daily digest as GitHub Issue ─────────────────────────────

  post-digest:
    needs: [triage-emails, scrape-ai-news, create-drafts]
    if: always() && needs.triage-emails.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: "*-${{ github.run_id }}"
          path: /tmp/artifacts/
        continue-on-error: true

      - name: Inject MCP config
        run: |
          printf '{"mcpServers":{"github":{"command":"npx","args":["-y","@modelcontextprotocol/server-github"],"env":{"GITHUB_PERSONAL_ACCESS_TOKEN":"PLACEHOLDER"}}}}' \
            > /tmp/mcp-config.json
          sed -i "s/PLACEHOLDER/${{ secrets.GITHUB_TOKEN }}/g" /tmp/mcp-config.json

      - name: Generate and post digest (Claude)
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Available data files (check with: find /tmp/artifacts -name '*.json' | head -20):
            - email triage: /tmp/artifacts/email-triage-*/email_triage.json
            - ai digest:    /tmp/artifacts/ai-digest-*/ai_digest.json  (may not exist)

            Create a daily digest and post it as a GitHub issue.

            Write the digest body to /tmp/digest_body.md with this format:

            ---
            ## 🔴 Ne pas louper ([N])
            [For each critique email:]
            > **[from]** — [subject] · `[time]`
            > [summary]
            > 💬 *Draft créé dans Gmail*

            ---
            ## 🟡 Interne ([N])
            [For each internal email:]
            - **[from]** — [subject] · [summary]

            ---
            ## 🔵 Intégrations & Alertes ([N])
            [Group by service:]
            - **[Service]**: [summary] [⚠️ if action_required]

            ---
            ## 🤖 IA — Ne pas rater
            [If ai_digest exists:]

            **TL;DR**
            - [bullet 1]
            - [bullet 2]
            - [bullet 3]

            **Tendances majeures**
            [top 3 from ai_digest, each in 2-3 lines]

            **Nouveaux acteurs**
            [if any]

            **À tester**
            [if any]

            ---
            *⚡ [N] emails · [N] drafts · [date]*
            ---

            Then create the issue:
            Bash("gh issue create \
              --title '📧 Daily Digest — $(date +%Y-%m-%d)' \
              --label 'digest' \
              --body-file /tmp/digest_body.md \
              --repo ${{ github.repository }}")
          claude_args: |
            --max-turns 6
            --mcp-config /tmp/mcp-config.json
            --allowedTools "Bash,Read,Write"
          settings: |
            {"env": {"GH_TOKEN": "${{ secrets.GITHUB_TOKEN }}"}}
