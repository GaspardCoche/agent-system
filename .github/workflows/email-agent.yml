name: Email Agent (Daily Digest)
on:
  schedule:
    - cron: '30 7 * * 1-5'
    - cron: '30 9 * * 6,0'
  workflow_dispatch:
    inputs:
      hours_back:
        description: 'Hours of emails to process'
        required: false
        default: '24'
        type: string
      skip_ai_digest:
        description: 'Skip AI news scraping'
        required: false
        default: 'false'
        type: string

jobs:
  fetch-emails:
    runs-on: ubuntu-latest
    outputs:
      email_count: ${{ steps.fetch.outputs.email_count }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install google-auth google-auth-oauthlib google-api-python-client

      - name: Fetch emails
        id: fetch
        env:
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          GMAIL_USER_EMAIL: ${{ secrets.GMAIL_USER_EMAIL }}
        run: |
          python3 .github/scripts/gmail_client.py \
            --hours-back ${{ inputs.hours_back || '24' }} \
            --output /tmp/raw_emails.json
          COUNT=$(python3 -c "import json; print(len(json.load(open('/tmp/raw_emails.json'))))")
          echo "email_count=$COUNT" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: raw-emails-${{ github.run_id }}
          path: /tmp/raw_emails.json
          retention-days: 1

  scrape-ai-news:
    runs-on: ubuntu-latest
    if: ${{ inputs.skip_ai_digest != 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install google-genai

      - name: Scrape AI news
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: python3 .github/scripts/ai_news_scraper.py

      - name: Synthesize with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 .github/scripts/gemini_agent.py \
            --task synthesize \
            --input /tmp/ai_news_raw.txt \
            --output /tmp/ai_digest.json

      - uses: actions/upload-artifact@v4
        with:
          name: ai-digest-${{ github.run_id }}
          path: /tmp/ai_digest.json
          retention-days: 1

  triage-emails:
    needs: fetch-emails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: raw-emails-${{ github.run_id }}
          path: /tmp/

      - name: Write MCP config
        run: |
          printf '{"mcpServers":{"memory":{"command":"npx","args":["-y","@modelcontextprotocol/server-memory"],"env":{}}}}' \
            > /tmp/mcp-config.json

      - name: Triage emails (Claude)
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Read agent_prompts/email-triage.md carefully.
            Raw emails are in /tmp/raw_emails.json.
            Your email: ${{ secrets.GMAIL_USER_EMAIL }}
            Internal domain: ${{ secrets.INTERNAL_EMAIL_DOMAIN || 'none' }}
            Classify each email and write /tmp/email_triage.json.
          claude_args: --max-turns 8 --allowedTools "Bash,Read,Write" --mcp-config /tmp/mcp-config.json
          settings: |
            {"env": {"AGENT_ROLE": "email-triage"}}

      - uses: actions/upload-artifact@v4
        with:
          name: email-triage-${{ github.run_id }}
          path: /tmp/email_triage.json
          retention-days: 1

  create-drafts:
    needs: triage-emails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install google-auth google-auth-oauthlib google-api-python-client

      - uses: actions/download-artifact@v4
        with:
          name: email-triage-${{ github.run_id }}
          path: /tmp/

      - name: Create Gmail drafts
        env:
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          GMAIL_USER_EMAIL: ${{ secrets.GMAIL_USER_EMAIL }}
        run: |
          python3 .github/scripts/gmail_client.py \
            --create-drafts \
            --triage-file /tmp/email_triage.json

  post-digest:
    needs: [triage-emails, scrape-ai-news, create-drafts]
    if: always() && needs.triage-emails.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: "*-${{ github.run_id }}"
          path: /tmp/artifacts/
        continue-on-error: true

      - name: Write MCP config
        run: |
          printf '{"mcpServers":{"github":{"command":"npx","args":["-y","@modelcontextprotocol/server-github"],"env":{"GITHUB_PERSONAL_ACCESS_TOKEN":"PLACEHOLDER"}}}}' \
            > /tmp/mcp-config.json
          sed -i "s/PLACEHOLDER/${{ secrets.GITHUB_TOKEN }}/g" /tmp/mcp-config.json

      - name: Generate and post digest (Claude)
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Find and read available data:
            Bash("find /tmp/artifacts -name '*.json' | head -10 | xargs -I{} cat {}")

            Write a daily digest to /tmp/digest_body.md then create a GitHub issue:
            Bash("gh issue create --title '📧 Daily Digest — $(date +%Y-%m-%d)' --label 'digest' --body-file /tmp/digest_body.md --repo ${{ github.repository }}")

            Digest format:
            ## 🔴 Ne pas louper
            [critique emails with draft note]
            ## 🟡 Interne
            [internal emails]
            ## 🔵 Intégrations & Alertes
            [alerts grouped by service]
            ## 🤖 IA — Ne pas rater
            [ai digest if available]
            ---
            *⚡ [N] emails · [N] drafts · $(date +%Y-%m-%d)*
          claude_args: --max-turns 6 --allowedTools "Bash,Read,Write" --mcp-config /tmp/mcp-config.json
          settings: |
            {"env": {"GH_TOKEN": "${{ secrets.GITHUB_TOKEN }}"}}
