name: Reusable Claude Agent Base
on:
  workflow_call:
    inputs:
      agent_role:
        required: true
        type: string
      task_json:
        required: true
        type: string
      max_turns:
        required: false
        type: string
        default: "8"
      allowed_tools:
        required: false
        type: string
        default: "none"

jobs:
  run_agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Echo inputs
        run: |
          echo "agent_role=${{ inputs.agent_role }}"
          echo "max_turns=${{ inputs.max_turns }}"
          echo "allowed_tools=${{ inputs.allowed_tools }}"
