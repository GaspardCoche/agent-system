name: Vault Save (from Digest CTA)

on:
  issues:
    types: [labeled]

jobs:
  save-to-vault:
    if: contains(github.event.issue.labels.*.name, 'vault-save')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Parse issue and create vault note
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: python3 .github/scripts/vault_save_note.py

      - name: Commit vault note
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/vault/ai-news/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "vault: save article from digest"
          git push

      - name: Close issue with confirmation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue close "$ISSUE_NUMBER" \
            --comment "Article sauvegarde dans le vault." \
            --repo "${{ github.repository }}"
