name: Vault Save (from Digest CTA)

on:
  issues:
    types: [labeled]

jobs:
  save-to-vault:
    if: contains(github.event.issue.labels.*.name, 'vault-save')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Parse issue and create vault note
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          python3 << 'PYEOF'
          import os, re
          from datetime import datetime
          from pathlib import Path

          body = os.environ.get("ISSUE_BODY", "")
          raw_title = os.environ.get("ISSUE_TITLE", "Article")
          title = re.sub(r'^[\U0001f4cc\U0001f4cd\u2b50\s]+', '', raw_title).strip()

          meta = {}
          for line in body.split("\n"):
              if "---" in line.strip() and len(line.strip()) <= 4:
                  break
              if ":" in line:
                  key, val = line.split(":", 1)
                  meta[key.strip().lower()] = val.strip()

          summary_parts = body.split("---")
          summary = summary_parts[-1].strip() if len(summary_parts) > 1 else body.strip()

          date = datetime.now().strftime("%Y-%m-%d")
          slug = re.sub(r'[^a-z0-9]+', '-', title.lower())[:60].strip('-')
          note_dir = Path("docs/vault/ai-news")
          note_dir.mkdir(parents=True, exist_ok=True)
          note_path = note_dir / f"{date}-{slug}.md"

          source = meta.get("source", "")
          url = meta.get("url", "")
          category = meta.get("category", "")
          image = meta.get("image", "")
          importance = meta.get("importance", "")
          tags_raw = meta.get("tags", "")
          tags_list = [t.strip() for t in tags_raw.split(",") if t.strip()]

          frontmatter = f"""---
title: "{title}"
source: "{source}"
url: "{url}"
category: "{category}"
importance: "{importance}"
date: {date}
tags: [{', '.join(f'"{t}"' for t in tags_list)}]
---"""

          image_block = f"\n![{title}]({image})\n" if image else ""

          note = f"""{frontmatter}

# {title}
{image_block}
**Source:** [{source}]({url}) | **Categorie:** {category} | **Importance:** {importance}

{summary}

---
*Sauvegarde depuis AI Intelligence Briefing du {date}*
"""
          note_path.write_text(note, encoding="utf-8")
          print(f"Note created: {note_path}")
          PYEOF

      - name: Commit vault note
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/vault/ai-news/
          git diff --cached --quiet && { echo "No changes to commit"; exit 0; }
          git commit -m "vault: save article from digest"
          git push

      - name: Close issue with confirmation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue close ${{ github.event.issue.number }} \
            --comment "Article sauvegarde dans le vault. Disponible dans \`docs/vault/ai-news/\`." \
            --repo ${{ github.repository }}
