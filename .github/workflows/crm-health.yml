name: CRM Health Check (Weekly)

on:
  schedule:
    - cron: '0 6 * * 1'  # Lundi 08:00 heure belge (UTC+2)
  workflow_dispatch:
    inputs:
      full_audit:
        description: 'Run full audit (slower, more thorough)'
        required: false
        default: 'false'
        type: string

jobs:
  health-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests -q

      - name: Run CRM health check
        env:
          HUBSPOT_PRIVATE_APP_TOKEN: ${{ secrets.HUBSPOT_PRIVATE_APP_TOKEN }}
        run: python3 .github/scripts/crm_health_check.py

      - name: Post health report as GitHub issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f /tmp/crm_health_report.md ] && [ -s /tmp/crm_health_report.md ]; then
            gh issue create \
              --title "🏥 CRM Health Report — $(date +%Y-%m-%d)" \
              --label "crm,health-check" \
              --body-file /tmp/crm_health_report.md \
              --repo "$GITHUB_REPOSITORY"
          fi

      - name: Send report by email
        continue-on-error: true
        env:
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          GMAIL_USER_EMAIL: ${{ secrets.GMAIL_USER_EMAIL }}
        run: |
          if [ -z "$GMAIL_TOKEN_JSON" ] || [ -z "$GMAIL_USER_EMAIL" ]; then
            echo "Gmail not configured — skipping email"
            exit 0
          fi
          pip install google-auth google-auth-oauthlib google-api-python-client -q
          python3 .github/scripts/crm_health_email.py

      - name: Commit health snapshot
        continue-on-error: true
        run: |
          if [ -f /tmp/crm_health_snapshot.json ]; then
            mkdir -p docs/data
            cp /tmp/crm_health_snapshot.json docs/data/crm_health_latest.json
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add docs/data/crm_health_latest.json
            git diff --cached --quiet && exit 0
            git commit -m "health: CRM snapshot $(date +%Y-%m-%d)"
            git pull --rebase -X theirs origin main && git push || true
          fi

      - name: Close old health issues
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue list --label health-check --state open --json number,createdAt \
            --jq '[.[] | select(.createdAt < (now - 86400*8 | strftime("%Y-%m-%dT%H:%M:%SZ")))] | .[].number' \
            --repo ${{ github.repository }} | while read -r NUM; do
            gh issue close "$NUM" --repo ${{ github.repository }} 2>/dev/null || true
          done
