name: Scout — Web Intelligence RGPD
on:
  workflow_dispatch:
    inputs:
      sheet_id:
        description: 'Google Sheet ID to enrich'
        required: true
        type: string
      sheet_tab:
        description: 'Sheet tab name'
        required: false
        default: 'Prospects'
        type: string
      columns_to_enrich:
        description: 'Comma-separated columns to fill (e.g. description,sector,size)'
        required: false
        default: 'description,sector,size,hq_city'
        type: string
      dry_run:
        description: 'Preview only, do not write to sheet'
        required: false
        default: 'true'
        type: string
  repository_dispatch:
    types: [scout-enrich]

jobs:
  scout:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests google-auth google-auth-oauthlib google-api-python-client -q

      - name: Build Scout task
        run: |
          python3 << 'PYEOF'
          import json, os

          # Supporte workflow_dispatch et repository_dispatch
          event_name = os.environ.get("GITHUB_EVENT_NAME", "workflow_dispatch")

          if event_name == "repository_dispatch":
              payload = json.loads(os.environ.get("CLIENT_PAYLOAD", "{}"))
              task = {
                  "task_id": os.environ.get("GITHUB_RUN_ID", ""),
                  "event": "repository_dispatch",
                  "sheet_id": payload.get("sheet_id", ""),
                  "sheet_tab": payload.get("sheet_tab", "Prospects"),
                  "columns_to_enrich": payload.get("columns_to_enrich", "description,sector,size"),
                  "dry_run": payload.get("dry_run", False),
                  "repository": os.environ.get("GITHUB_REPOSITORY", ""),
              }
          else:
              task = {
                  "task_id": os.environ.get("GITHUB_RUN_ID", ""),
                  "event": "workflow_dispatch",
                  "sheet_id": os.environ.get("SHEET_ID", ""),
                  "sheet_tab": os.environ.get("SHEET_TAB", "Prospects"),
                  "columns_to_enrich": os.environ.get("COLUMNS_TO_ENRICH", "description,sector,size,hq_city").split(","),
                  "dry_run": os.environ.get("DRY_RUN", "true").lower() == "true",
                  "repository": os.environ.get("GITHUB_REPOSITORY", ""),
              }

          json.dump(task, open("/tmp/agent_task.json", "w"), indent=2)
          print(f"Task: sheet={task.get('sheet_id')}, dry_run={task.get('dry_run')}")
          PYEOF
        env:
          SHEET_ID: ${{ inputs.sheet_id || '' }}
          SHEET_TAB: ${{ inputs.sheet_tab || 'Prospects' }}
          COLUMNS_TO_ENRICH: ${{ inputs.columns_to_enrich || 'description,sector,size,hq_city' }}
          DRY_RUN: ${{ inputs.dry_run || 'true' }}
          CLIENT_PAYLOAD: ${{ toJSON(github.event.client_payload) }}

      - name: Write MCP config
        env:
          GH_TOKEN_MCP: ${{ secrets.GITHUB_TOKEN }}
          FIRECRAWL_KEY_MCP: ${{ secrets.FIRECRAWL_API_KEY }}
        run: |
          python3 -c "
          import json, os
          cfg = {'mcpServers': {
            'filesystem': {'command': 'npx', 'args': ['-y', '@modelcontextprotocol/server-filesystem', '/home/runner/work'], 'env': {}},
            'github': {'command': 'npx', 'args': ['-y', '@modelcontextprotocol/server-github'], 'env': {'GITHUB_PERSONAL_ACCESS_TOKEN': os.environ['GH_TOKEN_MCP']}},
            'firecrawl': {'command': 'npx', 'args': ['-y', 'firecrawl-mcp'], 'env': {'FIRECRAWL_API_KEY': os.environ.get('FIRECRAWL_KEY_MCP', '')}},
            'memory': {'command': 'npx', 'args': ['-y', '@modelcontextprotocol/server-memory'], 'env': {}}
          }}
          json.dump(cfg, open('/tmp/mcp-config.json', 'w'))
          "

      - name: Install MCP servers
        run: |
          npm install -g \
            @modelcontextprotocol/server-filesystem \
            @modelcontextprotocol/server-github \
            firecrawl-mcp \
            @modelcontextprotocol/server-memory

      - name: Run Scout agent
        uses: anthropics/claude-code-action@v1
        continue-on-error: true
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Read agent_prompts/scout.md.
            Task is in /tmp/agent_task.json.
            Execute the web enrichment task following Scout's RGPD rules.
            Write results to /tmp/agent_result.json.
          claude_args: --max-turns 12 --allowedTools "Bash,Read,Write,Edit,mcp__filesystem__read_file,mcp__filesystem__write_file,mcp__firecrawl__firecrawl_scrape,mcp__firecrawl__firecrawl_search,mcp__github__add_issue_comment,mcp__memory__add_observations,mcp__memory__search_nodes" --mcp-config /tmp/mcp-config.json
          settings: |
            {
              "env": {
                "FIRECRAWL_API_KEY": "${{ secrets.FIRECRAWL_API_KEY }}",
                "GOOGLE_SHEETS_TOKEN": "${{ secrets.GOOGLE_SHEETS_TOKEN }}",
                "GITHUB_REPOSITORY": "${{ github.repository }}"
              }
            }

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: agent-result-scout-${{ github.run_id }}
          path: /tmp/agent_result.json
          retention-days: 7

      - name: Generate report + update dashboard
        if: always()
        env:
          REPO: ${{ github.repository }}
          SHEET_ID: ${{ inputs.sheet_id || github.event.client_payload.sheet_id || '' }}
        run: |
          mkdir -p /tmp/scout_results
          cp /tmp/agent_result.json /tmp/scout_results/agent_result.json 2>/dev/null || true
          STATUS="success"
          python3 -c "import json,sys; d=json.load(open('/tmp/agent_result.json')); sys.exit(0 if d.get('status')=='complete' else 1)" 2>/dev/null || STATUS="failed"
          python3 .github/scripts/generate_report.py \
            --run-id "${{ github.run_id }}" \
            --workflow "scout" \
            --title "Scout enrichment $SHEET_ID" \
            --status "$STATUS" \
            --event "${{ github.event_name }}" \
            --repo "$REPO" \
            --results-dir /tmp/scout_results \
            --output-dir docs/reports \
            --dashboard-file docs/data/runs.json

      - name: Commit report and dashboard
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -d docs/vault ]; then
            python3 .github/scripts/vault_builder.py --vault-dir docs/vault --output docs/data/graph.json 2>/dev/null || true
          fi
          git add docs/reports/ docs/data/runs.json docs/data/graph.json docs/vault/ reports/
          git diff --cached --quiet || git commit -m "report: scout run ${{ github.run_id }}"
          git pull --rebase origin main 2>/dev/null || true
          git push

      - name: Send Slack notification
        if: always() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          RUN_URL="https://github.com/$REPO/actions/runs/$RUN_ID"
          PAYLOAD="{\"text\":\"🔍 *Scout* — Web enrichment completed · <${RUN_URL}|Run #${RUN_ID}>\"}"
          curl -s -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"
